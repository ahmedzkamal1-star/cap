name: Build Android APK (Buildozer)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile_app/**'
      - '.github/workflows/android_build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev openjdk-17-jdk unzip zip libtool pkg-config autoconf automake libltdl-dev libffi-dev libssl-dev python3-setuptools libjpeg-dev libfreetype6-dev python3-pip libsqlite3-dev patch cmake libunwind-dev
        # Direct download of libtinfo5 (required for some NDK toolchains)
        wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb || wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.2-0ubuntu2_amd64.deb
        sudo dpkg -i libtinfo5_*.deb || true
        pip install --upgrade pip
        pip install buildozer "Cython>=3.0.10"

    - name: Build with Buildozer
      run: |
        cd mobile_app
        # Initializing or ensuring spec is there (it is)
        # Using -v for verbose to see errors
        yes | buildozer -v android debug
      env:
        BUILDOZER_ALLOW_ORG_KIVY_ANDROID_PYTHONACTIVITY: 1
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: aldahid-secure-apk
        path: |
          mobile_app/bin/*.apk
          mobile_app/.buildozer/android/platform/build-*/build/logs/*.log
