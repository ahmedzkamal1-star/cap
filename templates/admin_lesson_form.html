{% extends "base.html" %}

{% block title %}إضافة درس - {{ course.name }} - Al-dahih{% endblock %}

{% block content %}
<div class="main-container-v2 animate-slide-up" style="max-width: 600px; margin: 2rem auto;">
    <div class="card" style="border-top: 8px solid #10b981; padding: 2.5rem;">
        <h2
            style="font-weight: 900; color: var(--text-primary); margin-bottom: 10px; display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-plus-circle" style="color: #10b981;"></i> إضافة درس جديد
        </h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; font-weight: 600;">للمادة: {{ course.name }}</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-field-v2" style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">عنوان
                    الدرس</label>
                <input type="text" name="title" required placeholder="مثال: مقدمة في المادة"
                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
            </div>

            <div class="form-field-v2" style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">محتوى
                    إضافي (اختياري)</label>
                <textarea name="content" rows="4" placeholder="اكتب تفاصيل إضافية هنا..."
                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary); font-family: inherit; resize: vertical;"></textarea>
            </div>

            <div class="form-field-v2" style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">ملف
                    الدرس (PDF)</label>
                <div
                    style="background: var(--hover-bg); padding: 20px; border-radius: 12px; border: 2px dashed var(--border-color); text-align: center;">
                    <input type="file" name="pdf_file" accept=".pdf"
                        style="width: 100%; cursor: pointer; color: var(--text-secondary);">
                    <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 8px;"><i
                            class="fas fa-info-circle"></i> يقبل تنسيق PDF فقط</p>
                </div>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="premium-btn"
                    style="flex: 2; justify-content: center; padding: 16px; background: #10b981;">
                    <i class="fas fa-cloud-upload-alt" style="margin-left: 10px;"></i> رفع الدرس
                </button>
                <a href="{{ url_for('main.admin_course_content', course_id=course.id) }}" class="premium-btn"
                    style="flex: 1; justify-content: center; background: var(--bg-main); color: var(--text-secondary); border: 1px solid var(--border-color); box-shadow: none; text-decoration: none;">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
