name: Build Android APK (Buildozer)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile_app/**'
      - '.github/workflows/android_build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Get Date
      id: get-date
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('mobile_app/buildozer.spec') }}

    - name: Build with Buildozer
      uses: ArtemSashnin/buildozer-action@v1
      with:
        workdir: mobile_app
        buildozer_version: master

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aldahid-secure-apk-${{ steps.get-date.outputs.date }}
        path: mobile_app/bin/*.apk
