{% extends "base.html" %}

{% block title %}إضافة امتحان جديد - {{ course.name }}{% endblock %}

{% block content %}

<div class="main-container-v2 animate-fade-in">
    <div class="section-header-v2" style="margin-top: 10px;">
        <h3><i class="fas fa-file-alt" style="color: #667eea; margin-left: 8px;"></i>إضافة امتحان جديد</h3>
    </div>
    <p style="color: #64748b; font-size: 14px; margin-bottom: 25px; padding: 0 5px;">إضافة مادة: <strong
            style="color: #1e293b;">{{ course.name }}</strong></p>

    <form method="POST">
        <div class="settings-group" style="padding: 25px;">
            <div class="form-field-v2">
                <label>عنوان الامتحان</label>
                <input type="text" name="title" required placeholder="مثلاً: امتحان الميدتيرم - الفصل الدراسي الثاني">
            </div>

            <div class="form-field-v2">
                <label>الأسئلة / التعليمات</label>
                <textarea name="questions" rows="10"
                    style="width: 100%; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; outline: none; transition: 0.3s; box-sizing: border-box;"
                    placeholder="اكتب الأسئلة هنا بالتفصيل أو ضع روابط الملفات المساعدة..."></textarea>
                <p style="font-size: 11px; color: #94a3b8; margin-top: 8px;">
                    <i class="fas fa-info-circle" style="margin-left: 5px;"></i> نصيحة: يمكنك استخدام التنسيق لكتابة
                    الأسئلة بوضوح.
                </p>
            </div>
        </div>

        <div style="margin-top: 25px; display: flex; gap: 12px;">
            <button type="submit" class="save-btn-v2" style="flex: 2; margin: 0;">🚀 حفظ ونشر الامتحان</button>
            <a href="{{ url_for('main.admin_course_content', course_id=course.id) }}" class="header-action-btn"
                style="flex: 1; height: 45px; display: flex; align-items: center; justify-content: center; text-decoration: none; background: #f1f5f9; color: #475569; border-radius: 15px;">
                إلغاء
            </a>
        </div>
    </form>
</div>

{% endblock %}
