<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الدحيح</title>
    <!-- Google Cairo Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=22.0">
</head>

<body class="login-page">
    <!-- Premium Mesh Background (v35.0) -->
    <div class="mesh-background">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="login-container">
        <div class="login-header" style="text-align: center;">
            <!-- الشعار -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="شعار المنصة" class="logo"
                style="width: 120px; display: block; margin: 0 auto 1.5rem; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
            <h2>تسجيل الدخول</h2>
            <p>أهلاً بك مجدداً! يرجى إدخال بياناتك</p>
        </div>

        <div class="flash-messages-login" style="margin-bottom: 1.5rem;">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}"
                style="padding: 12px; border-radius: 12px; background: rgba(0, 180, 216, 0.1); color: var(--sky-primary); font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; border: 1px solid rgba(0, 180, 216, 0.2);">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <form class="login-form" method="POST" action="{{ url_for('main.login') }}">
            <div class="input-group">
                <input type="text" name="code" placeholder="كود الطالب" required autocomplete="off">
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin: 1.5rem 0.5rem; font-size: 0.95rem;">
                <label
                    style="color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700;">
                    <input type="checkbox" name="remember"
                        style="width: 18px; height: 18px; margin: 0; accent-color: var(--sky-primary);"> تذكرني
                </label>
                <a href="#" style="color: var(--sky-primary); text-decoration: none; font-weight: 800;">نسيت كلمة
                    المرور؟</a>
            </div>

            <button type="submit" class="premium-btn"
                style="width: 100%; justify-content: center; padding: 18px; font-size: 1.2rem;">
                دخول المنصة <i class="fas fa-chevron-left" style="margin-right: 10px; font-size: 1rem;"></i>
            </button>
        </form>

        <div
            style="text-align: center; margin-top: 2.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="color: var(--text-secondary); font-size: 0.95rem; font-weight: 600;">ليس لديك حساب؟ <a
                    href="{{ url_for('main.register') }}"
                    style="color: var(--sky-primary); text-decoration: none; font-weight: 900; margin-right: 5px;">إنشاء
                    حساب</a></p>
        </div>
    </div>
</body>

</html>
