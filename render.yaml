services:
  # Web service for the Student Management System
  - type: web
    name: student-management-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production

# Note: Render doesn't provide a managed MySQL database in the free tier
# consistently in all regions, but they do provide PostgreSQL. 
# Since the user specifically asked for MySQL and "wants it free",
# I will define a MySQL database here, but I must warn the user 
# that Render's MySQL is often part of their paid "Instance" types.
# Actually, for free hosting, PostgreSQL is the standard on Render.
# However, if they want MySQL, we might need a different provider like Railway 
# or use a Docker container on Render (which is also not free).
# WAIT: Render actually doesn't have a "Managed MySQL" free tier.
# Let me reconsider. 

databases:
  - name: student-db
    databaseName: student_management
    user: student_user
    plan: free # Note: This plan is for PostgreSQL on Render.
