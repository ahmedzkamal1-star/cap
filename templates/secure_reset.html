{% extends "base.html" %}

{% block content %}
<div class="auth-container-v2 animate-slide-up" style="max-width: 500px; margin: 3rem auto; padding: 0 15px;">
    <div class="card" style="border-top: 8px solid #ef4444; padding: 2.5rem; text-align: center;">
        <div style="font-size: 3.5rem; margin-bottom: 1.5rem; filter: drop-shadow(0 10px 15px rgba(239, 68, 68, 0.2));">
            🛡️</div>
        <h2 style="font-weight: 900; color: var(--text-primary); margin-bottom: 10px;">استعادة أمنية كاملة</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2.5rem; font-weight: 600;">يرجى إدخال الكود الجامعي وكلمة
            مرور المدير (Master Key) لإعادة التعيين.</p>

        <form method="POST">
            <div class="form-field-v2" style="margin-bottom: 1.5rem; text-align: right;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">الكود
                    الجامعي</label>
                <input type="text" name="code" required
                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary); font-family: 'Outfit';">
            </div>

            <div class="form-field-v2" style="margin-bottom: 1.5rem; text-align: right;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">كود
                    الأمان الرئاسي</label>
                <input type="password" name="master_key" required placeholder="Master Key required"
                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
            </div>

            <div class="form-field-v2" style="margin-bottom: 2.5rem; text-align: right;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">كلمة
                    المرور الجديدة</label>
                <input type="password" name="new_password" required placeholder="••••••••"
                    style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
            </div>

            <button type="submit" class="premium-btn"
                style="width: 100%; justify-content: center; padding: 18px; font-size: 1.1rem; background: #ef4444;">
                <i class="fas fa-shield-alt" style="margin-left: 10px;"></i> تغيير كلمة المرور الآن
            </button>
        </form>
    </div>
</div>
{% endblock %}
