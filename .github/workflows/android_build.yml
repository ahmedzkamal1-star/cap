name: Build Android APK (Buildozer)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mobile_app/**'
      - '.github/workflows/android_build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev openjdk-17-jdk unzip zip libtinfo5 libtool pkg-config autoconf automake libltdl-dev libffi-dev libssl-dev python3-setuptools
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Check structure
      run: |
        ls -R mobile_app/
        [ -f mobile_app/buildozer.spec ] && echo "Spec found" || echo "Spec MISSING"

    - name: Build with Buildozer
      run: |
        cd mobile_app
        # Force buildozer to be verbose and use a specific NDK/SDK if needed
        export APP_ANDROID_ARCHS="arm64-v8a"
        yes | buildozer -v android debug
      env:
        BUILDOZER_ALLOW_ORG_KIVY_ANDROID_PYTHONACTIVITY: 1
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: aldahid-secure-apk
        path: |
          mobile_app/bin/*.apk
          mobile_app/.buildozer/android/platform/build-*/build/logs/*.log
