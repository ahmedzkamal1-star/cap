{% extends "base.html" %}

{% block title %}{{ action }} Course - Al-dahih{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2>{{ action }} مادة دراسية</h2>
        <form method="POST">
            {% if action == 'Add' %}
            <div class="form-group">
                <label for="code">كود المادة</label>
                <input type="text" id="code" name="code" required>
            </div>
            {% else %}
            <div class="form-group">
                <label>كود المادة</label>
                <input type="text" value="{{ course.code }}" disabled style="background-color: #eee;">
            </div>
            {% endif %}

            <div class="form-group">
                <label for="name">اسم المادة</label>
                <input type="text" id="name" name="name" value="{{ course.name if course else '' }}" required>
            </div>

            <div class="form-group">
                <label for="description">وصف المادة</label>
                <input type="text" id="description" name="description"
                    value="{{ course.description if course else '' }}">
            </div>

            <div class="form-group">
                <label for="credits">عدد الساعات</label>
                <input type="number" id="credits" name="credits" value="{{ course.credits if course else 3 }}" required>
            </div>

            <div class="form-group">
                <label for="instructor">اسم المدرس</label>
                <input type="text" id="instructor" name="instructor" value="{{ course.instructor if course else '' }}"
                    required>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="submit" style="flex: 1;">حفظ</button>
                <a href="{{ url_for('main.admin_courses') }}"
                    style="flex: 1; text-align: center; background-color: #6c757d; color: white; padding: 0.8rem; text-decoration: none; border-radius: 4px;">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
