{% extends "base.html" %}

{% block title %}Admin Dashboard - Al-dahih{% endblock %}

{% block content %}

<div class="main-container-v2 animate-fade-in">
    <!-- Dahih Premium Header/Stats -->
    <div class="stats-grid-v2">
        <div class="card stat-card-v2">
            <div>
                <div class="stat-label-v2">إجمالي الطلاب</div>
                <div class="stat-value-v2" style="font-family: 'Outfit';">{{ students_count }}</div>
            </div>
            <div class="stat-icon-dahih" style="margin-right: auto; color: var(--sky-primary);">
                <i class="fas fa-user-graduate"></i>
            </div>
        </div>
        <div class="card stat-card-v2" style="--sky-primary: #f59e0b;">
            <div>
                <div class="stat-label-v2">بانتظار المراجعة</div>
                <div class="stat-value-v2" style="font-family: 'Outfit';">12</div>
            </div>
            <div class="stat-icon-dahih" style="margin-right: auto; color: #f59e0b;">
                <i class="fas fa-clock"></i>
            </div>
        </div>
    </div>


    <!-- 3-Column Menu Grid (REDUCED) -->
    <div class="section-header-v2">
        <h3><i class="fas fa-bookmark" style="margin-left: 8px;"></i>إدارة المنصة</h3>
    </div>

    <div class="menu-grid-v2"
        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;">
        <a href="{{ url_for('main.admin_moderators') }}" class="card"
            style="text-align: center; padding: 1.5rem; text-decoration: none;">
            <div style="font-size: 2rem; color: var(--sky-primary); margin-bottom: 10px;"><i
                    class="fas fa-user-shield"></i></div>
            <span style="font-weight: 800; color: var(--text-primary);">المشرفين</span>
        </a>
        <a href="{{ url_for('main.admin_posts') }}" class="card"
            style="text-align: center; padding: 1.5rem; text-decoration: none;">
            <div style="font-size: 2rem; color: var(--sky-secondary); margin-bottom: 10px;"><i
                    class="fas fa-newspaper"></i></div>
            <span style="font-weight: 800; color: var(--text-primary);">المنشورات</span>
        </a>
        <a href="{{ url_for('main.admin_courses') }}" class="card"
            style="text-align: center; padding: 1.5rem; text-decoration: none;">
            <div style="font-size: 2rem; color: #10b981; margin-bottom: 10px;"><i class="fas fa-book"></i></div>
            <span style="font-weight: 800; color: var(--text-primary);">المواد</span>
        </a>
        <a href="{{ url_for('main.admin_messages') }}" class="card"
            style="text-align: center; padding: 1.5rem; text-decoration: none;">
            <div style="font-size: 2rem; color: #f59e0b; margin-bottom: 10px;"><i class="fas fa-envelope"></i></div>
            <span style="font-weight: 800; color: var(--text-primary);">الرسائل</span>
        </a>
        <a href="{{ url_for('main.admin_manage_schedules') }}" class="card"
            style="text-align: center; padding: 1.5rem; text-decoration: none;">
            <div style="font-size: 2rem; color: var(--sky-primary); margin-bottom: 10px;"><i
                    class="fas fa-calendar-alt"></i></div>
            <span style="font-weight: 800; color: var(--text-primary);">الجداول</span>
        </a>
    </div>

</div>

{% endblock %}
