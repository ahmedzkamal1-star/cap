{% extends "base.html" %}

{% block title %}Admin Dashboard - Al-dahih{% endblock %}

{% block content %}

<div class="main-container-v2 animate-fade-in" style="padding: 0 15px;">
    <!-- Dahih Premium Header/Stats -->
    <div class="stats-grid-v2"
        style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px;">
        <div class="card stat-card-v2"
            style="border-right: 4px solid var(--p-primary); display: flex; align-items: center; gap: 15px;">
            <div class="stat-icon-dahih" style="background: rgba(99, 102, 241, 0.1); color: var(--p-primary);"><i
                    class="fas fa-users"></i></div>
            <div>
                <div class="stat-label-v2" style="font-size: 0.85rem; opacity: 0.8;">إجمالي الطلاب</div>
                <div class="stat-value-v2" style="font-size: 1.5rem; font-weight: 900;">{{ students_count }}</div>
            </div>
        </div>
        <div class="card stat-card-v2"
            style="border-right: 4px solid #f59e0b; display: flex; align-items: center; gap: 15px;">
            <div class="stat-icon-dahih" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;"><i
                    class="fas fa-clock"></i></div>
            <div>
                <div class="stat-label-v2" style="font-size: 0.85rem; opacity: 0.8;">بانتظار المراجعة</div>
                <div class="stat-value-v2" style="font-size: 1.5rem; font-weight: 900;">12</div>
            </div>
        </div>
    </div>

    <!-- Quick Search -->
    <div class="search-container" style="padding: 0 0 20px 0;">
        <div class="card search-box-v2"
            style="display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-radius: 18px;">
            <i class="fas fa-search" style="color: var(--p-text-muted);"></i>
            <input type="text" placeholder="ابحث عن طالب، مادة، رسالة..."
                style="border: none; background: transparent; flex: 1; outline: none; color: var(--p-text);">
            <i class="fas fa-sliders-h" style="color: var(--p-primary);"></i>
        </div>
    </div>

    <!-- 3-Column Menu Grid (REDUCED) -->
    <div class="section-header-v2" style="margin-right: 5px;">
        <h3><i class="fas fa-bookmark" style="color: var(--p-primary); margin-left: 8px;"></i>إدارة المنصة</h3>
    </div>

    <div class="menu-grid-v2"
        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px;">
        <a href="{{ url_for('main.admin_moderators') }}" class="card menu-item-v2"
            style="text-align: center; padding: 15px; text-decoration: none;">
            <div class="menu-icon-v2" style="color: var(--p-accent); margin-bottom: 8px; font-size: 1.5rem;"><i
                    class="fas fa-user-shield"></i></div>
            <span style="font-size: 0.8rem; font-weight: 700; color: var(--p-text);">المشرفين</span>
        </a>
        <a href="{{ url_for('main.admin_posts') }}" class="card menu-item-v2"
            style="text-align: center; padding: 15px; text-decoration: none;">
            <div class="menu-icon-v2" style="color: var(--p-primary); margin-bottom: 8px; font-size: 1.5rem;"><i
                    class="fas fa-newspaper"></i></div>
            <span style="font-size: 0.8rem; font-weight: 700; color: var(--p-text);">المنشورات</span>
        </a>
        <a href="{{ url_for('main.admin_courses') }}" class="card menu-item-v2"
            style="text-align: center; padding: 15px; text-decoration: none;">
            <div class="menu-icon-v2" style="color: #10b981; margin-bottom: 8px; font-size: 1.5rem;"><i
                    class="fas fa-book"></i></div>
            <span style="font-size: 0.8rem; font-weight: 700; color: var(--p-text);">المواد</span>
        </a>
        <a href="{{ url_for('main.admin_messages') }}" class="card menu-item-v2"
            style="text-align: center; padding: 15px; text-decoration: none;">
            <div class="menu-icon-v2" style="color: #f59e0b; margin-bottom: 8px; font-size: 1.5rem;"><i
                    class="fas fa-envelope"></i></div>
            <span style="font-size: 0.8rem; font-weight: 700; color: var(--p-text);">الرسائل</span>
        </a>
    </div>

    <!-- Recent Registration Requests -->
    <div class="section-header-v2"
        style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center; margin-right: 5px;">
        <h3><i class="fas fa-user-clock" style="color: var(--p-primary); margin-left: 8px;"></i>طلبات حديثة</h3>
        <a href="{{ url_for('main.admin_pending_users') }}"
            style="color: var(--p-primary); font-size: 13px; text-decoration: none; font-weight: 700;">عرض الكل</a>
    </div>

    <div class="requests-list-dahih">
        <a href="{{ url_for('main.admin_pending_users') }}" class="card request-item-dahih"
            style="display: flex; align-items: center; gap: 15px; padding: 15px; margin-bottom: 12px; text-decoration: none;">
            <div class="student-avatar-dahih"
                style="width: 45px; height: 45px; background: var(--grad-main); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900;">
                أ</div>
            <div class="student-info-dahih" style="flex: 1;">
                <div class="student-name-dahih" style="font-weight: 700; color: var(--p-text);">أحمد محمد عبدالله</div>
                <div class="student-meta-dahih" style="font-size: 0.75rem; color: var(--p-text-muted);">هندسة حاسوب •
                    12/02/2026</div>
            </div>
            <div class="status-dahih"
                style="font-size: 0.7rem; background: rgba(245, 158, 11, 0.1); color: #f59e0b; padding: 5px 10px; border-radius: 8px;">
                <i class="fas fa-hourglass-half" style="margin-left: 5px;"></i>
                <span>مراجعة</span>
            </div>
        </a>
    </div>
</div>

{% endblock %}
