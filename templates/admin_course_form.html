{% extends "base.html" %}

{% block title %}{{ action }} Course - Al-dahih{% endblock %}

{% block content %}
<div class="main-container-v2 animate-slide-up" style="max-width: 800px; margin: 2rem auto;">
    <div class="card" style="border-top: 8px solid var(--sky-primary); padding: 2.5rem;">
        <h2
            style="font-weight: 900; color: var(--text-primary); margin-bottom: 2.5rem; display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-book" style="color: var(--sky-primary);"></i> {{ 'إضافة' if action == 'Add' else 'تعديل' }}
            مادة دراسية
        </h2>

        <form method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-field-v2" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">كود
                        المادة</label>
                    {% if action == 'Add' %}
                    <input type="text" id="code" name="code" required placeholder="مثلاً: CS101"
                        style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
                    {% else %}
                    <input type="text" value="{{ course.code }}" disabled
                        style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--hover-bg); color: var(--text-secondary); cursor: not-allowed;">
                    {% endif %}
                </div>

                <div class="form-field-v2" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">اسم
                        المادة</label>
                    <input type="text" id="name" name="name" value="{{ course.name if course else '' }}" required
                        placeholder="مثلاً: لغة عربية"
                        style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
                </div>
            </div>

            <div class="form-field-v2" style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">وصف
                    المادة</label>
                <input type="text" id="description" name="description"
                    value="{{ course.description if course else '' }}" placeholder="وصف مختصر للمادة..."
                    style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-field-v2" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">عدد
                        الساعات</label>
                    <input type="number" id="credits" name="credits" value="{{ course.credits if course else 3 }}"
                        required
                        style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary); font-family: 'Outfit';">
                </div>

                <div class="form-field-v2" style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-primary);">اسم
                        المدرس</label>
                    <input type="text" id="instructor" name="instructor"
                        value="{{ course.instructor if course else '' }}" required placeholder="اسم المدرس..."
                        style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-primary);">
                </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="submit" class="premium-btn" style="flex: 2; justify-content: center; padding: 16px;">
                    <i class="fas fa-save" style="margin-left: 10px;"></i> حفظ البيانات
                </button>
                <a href="{{ url_for('main.admin_courses') }}" class="premium-btn"
                    style="flex: 1; justify-content: center; background: var(--bg-main); color: var(--text-secondary); border: 1px solid var(--border-color); box-shadow: none; text-decoration: none;">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
